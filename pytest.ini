[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    asyncio: marks tests as async
    bdd: marks tests as BDD scenarios
    property: marks tests as property-based
    regression: marks tests as regression/contract
    e2e: marks tests as end-to-end
