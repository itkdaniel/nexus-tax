name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install black isort
      - run: black --check app tests
      - run: isort --check-only app tests

  unit:
    name: Unit + regression + BDD + property tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      JWT_SECRET: "ci-test-secret-nexus-tax"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/unit/ tests/regression/ tests/bdd/ tests/property/ -v --tb=short

  e2e:
    name: End-to-end session flow tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      JWT_SECRET: "ci-test-secret-nexus-tax"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: pytest tests/e2e/ -v --tb=short

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t nexus-tax:ci .
      - name: Smoke test — /health
        run: |
          docker run -d --name nexus-tax-ci \
            -e DATABASE_URL="sqlite+aiosqlite:///./test.db" \
            -e JWT_SECRET="ci-smoke-secret" \
            -e DEBUG=true \
            -p 8003:8003 \
            nexus-tax:ci
          sleep 5
          curl --fail http://localhost:8003/health
          docker stop nexus-tax-ci
